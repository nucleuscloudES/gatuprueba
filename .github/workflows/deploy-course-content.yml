name: Deploy Course Content

on:
  push:
    branches: ["main"]
    paths:
      - "course-content-site/**"
      - ".github/workflows/deploy-course-content.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish course content branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./course-content-site
          publish_branch: course-content
          force_orphan: true
